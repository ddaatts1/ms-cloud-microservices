version: '3.8'

services:

  postgres:
    image: postgres:15
    container_name: postgres
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: 123456
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init-db.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - micro_net

  product-service:
    build: ./product-service
    ports:
      - "8081:8081"
    container_name: product-service
    depends_on:
      - postgres
    networks:
      - micro_net

  order-service:
    build: ./order-service
    ports:
      - "8082:8082"
    container_name: order-service
    depends_on:
      - postgres
    networks:
      - micro_net


volumes:
  postgres_data:

networks:
  micro_net:
    driver: bridge