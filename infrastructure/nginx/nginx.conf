events {}

http {

    upstream product-service {
        server product-service:8081;
    }

    upstream order-service {
        server order-service:8082;
    }

    server {
        listen 80;

        location /products {
            proxy_pass http://product-service;
        }

        location /orders {
            proxy_pass http://order-service;
        }
    }
}